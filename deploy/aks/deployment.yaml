apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: spring-batch-dashboard
  labels:
    app.kubernetes.io/name: spring-batch-dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: spring-batch-dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spring-batch-dashboard
    spec:
      containers:
        - name: dashboard
          image: ghcr.io/guavasoftcom/spring-batch-dashboard:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: dashboard-config
            - secretRef:
                name: dashboard-secrets
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
