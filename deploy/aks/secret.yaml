# Secret values consumed by the dashboard pod. Replace the placeholders before
# `kubectl apply`-ing — or, for production, swap this file for the Secrets
# Store CSI driver pulling from Azure Key Vault (see deploy/aks/README.md).
apiVersion: v1
kind: Secret
metadata:
  name: dashboard-secrets
  namespace: spring-batch-dashboard
type: Opaque
stringData:
  SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GITHUB_CLIENT_SECRET: replace-me
  APP_DATASOURCES_0_PASSWORD: replace-me
