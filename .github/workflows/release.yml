# Pushes the version-bump commit + tag and creates the GitHub Release as a
# dedicated GitHub App (better audit trail than the default `github-actions[bot]`,
# and the App can be added to a branch-protection bypass list — works with both
# Rulesets and classic Branch protection rules).
#
# Setup:
#   1. Create a GitHub App on the org/user with these repository permissions:
#        - Contents: Read and write
#        - Metadata: Read-only
#        - Pull requests: Read-only   (so --generate-notes can read merged PRs)
#   2. Install the App on this repo.
#   3. Copy its App ID and generate a private key. Add them as repo secrets:
#        - RELEASE_APP_ID
#        - RELEASE_APP_PRIVATE_KEY
#   4. Add the App to the bypass list of any Ruleset / branch-protection rule
#      that guards `main`.
#   5. Create an Environment named "Release" (Settings → Environments).
#      Under "Deployment branches", choose "Selected branches" and add `main`.
#      GitHub itself will reject runs dispatched from any other branch.
#
# After cutting the release this workflow also builds a Docker image bundling
# the SPA into the Spring Boot JAR (frontend/dist → src/main/resources/static)
# and pushes it to ghcr.io/<owner>/<repo>:<tag> + :latest. Auth uses the
# job-scoped GITHUB_TOKEN with `packages: write` — no new secrets required.
name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver bump to apply"
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Cut release
    runs-on: ubuntu-latest
    environment: Release
    permissions:
      contents: write
      packages: write
    steps:
      - name: Refuse to run outside main
        run: |
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "Releases can only be cut from refs/heads/main (got ${{ github.ref }})." >&2
            exit 1
          fi

      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true

      # Same gates as pull-request.yml — refuse to cut a release that wouldn't
      # pass PR review. If either composite fails, the workflow stops before
      # any version-bump commit, tag, or release is created. The composites
      # also pull in setup-java / setup-node, so no separate setup steps.

      - name: Verify backend (Checkstyle + tests + package + JaCoCo)
        uses: ./.github/actions/verify-backend

      - name: Verify frontend (lint + typecheck + build + tests + coverage)
        uses: ./.github/actions/verify-frontend

      # JDK and Node are already provisioned by the verify composites above;
      # the remaining steps (version bump via `npm version` and Maven
      # `versions:set`) reuse those toolchains.

      - name: Compute next version
        id: bump
        run: |
          set -euo pipefail
          current=$(node -p "require('./frontend/package.json').version")
          IFS='.' read -r major minor patch <<< "$current"
          case "${{ inputs.bump }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          next="${major}.${minor}.${patch}"
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "next=$next"       >> "$GITHUB_OUTPUT"
          echo "tag=v$next"       >> "$GITHUB_OUTPUT"
          echo "Bumping $current → $next"

      - name: Fail if tag already exists
        run: |
          if git rev-parse "refs/tags/${{ steps.bump.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.bump.outputs.tag }} already exists." >&2
            exit 1
          fi

      - name: Update frontend/package.json
        run: |
          cd frontend
          npm version --no-git-tag-version --allow-same-version "${{ steps.bump.outputs.next }}"

      - name: Update backend/pom.xml
        run: |
          cd backend
          ./mvnw -q -B versions:set -DnewVersion="${{ steps.bump.outputs.next }}-SNAPSHOT" -DgenerateBackupPoms=false

      - name: Commit version bump
        id: commit
        env:
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: |
          set -euo pipefail
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "${{ steps.app-token.outputs.installation-id }}+${APP_SLUG}[bot]@users.noreply.github.com"
          git add frontend/package.json backend/pom.xml
          if git diff --cached --quiet; then
            echo "Nothing to commit — versions already at target." >&2
            exit 1
          fi
          git commit -m "chore(release): ${{ steps.bump.outputs.tag }}"
          git push origin HEAD:${{ github.ref_name }}
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Tag release
        run: |
          git tag -a "${{ steps.bump.outputs.tag }}" -m "Release ${{ steps.bump.outputs.tag }}"
          git push origin "${{ steps.bump.outputs.tag }}"

      # Bake the SPA the verify-frontend composite already built into Spring Boot's
      # static resources, then repackage with the bumped version so the JAR's
      # internal version matches the just-pushed git tag.
      - name: Bundle SPA into Spring Boot static resources
        run: |
          mkdir -p backend/src/main/resources/static
          cp -R frontend/dist/. backend/src/main/resources/static/

      - name: Repackage JAR with bumped version
        working-directory: backend
        run: ./mvnw --batch-mode --no-transfer-progress -DskipTests package

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.bump.outputs.tag }}
            ghcr.io/${{ github.repository }}:latest

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh release create "${{ steps.bump.outputs.tag }}" \
            --target "${{ steps.commit.outputs.sha }}" \
            --title "${{ steps.bump.outputs.tag }}" \
            --generate-notes
