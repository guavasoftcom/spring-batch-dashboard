name: PR Checks

on:
  pull_request:
    branches: [main, master]

# Cancel in-progress runs when a new commit is pushed to the same PR.
concurrency:
  group: pr-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (${{ matrix.profile }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        profile: [postgresql, mysql]
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Verify (checkstyle + tests + package)
        # `verify` runs the validate phase (Checkstyle), test phase, and package phase.
        # Testcontainers picks up the Docker daemon that's already running on ubuntu-latest.
        # The active profile decides which JDBC driver and Testcontainers DB module are bundled.
        run: ./mvnw --batch-mode --no-transfer-progress -P${{ matrix.profile }} verify

      - name: Annotate Checkstyle results
        if: always()
        uses: jwgmeligmeyling/checkstyle-github-action@master
        with:
          path: 'backend/target/checkstyle-result.xml'
          name: Checkstyle (${{ matrix.profile }})

      - name: Publish test report
        if: always()
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: backend/target/surefire-reports/TEST-*.xml
          check_name: Backend tests (${{ matrix.profile }})
          require_tests: true

      - name: Comment test results on PR
        if: matrix.profile == 'postgresql' && always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: backend/target/surefire-reports/TEST-*.xml
          check_name: Backend test summary
          comment_title: Backend test summary
          comment_mode: always

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-surefire-reports-${{ matrix.profile }}
          path: backend/target/surefire-reports
          if-no-files-found: ignore

      - name: Comment JaCoCo coverage on PR
        if: matrix.profile == 'postgresql'
        uses: madrapps/jacoco-report@v1.7.1
        with:
          paths: backend/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: Backend coverage
          min-coverage-overall: 80
          min-coverage-changed-files: 80

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-jacoco-report-${{ matrix.profile }}
          path: backend/target/site/jacoco
          if-no-files-found: ignore

  frontend:
    name: Frontend (Node 20 + Yarn 4)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint
        run: yarn lint --format=json --output-file=eslint-report.json
        continue-on-error: true

      - name: Annotate ESLint results
        uses: ataylorme/eslint-annotate-action@v3
        with:
          report-json: frontend/eslint-report.json
          fail-on-warning: false
          fail-on-error: true

      - name: Typecheck + build
        run: yarn build

      - name: Run tests with coverage
        run: yarn test:coverage

      - name: Publish test report
        if: always()
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: frontend/test-results/junit.xml
          check_name: Frontend tests
          require_tests: true

      - name: Comment test results on PR
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: frontend/test-results/junit.xml
          check_name: Frontend test summary
          comment_title: Frontend test summary
          comment_mode: always

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results
          path: frontend/test-results
          if-no-files-found: ignore

      - name: Comment coverage report
        if: always()
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          working-directory: frontend
          name: Frontend coverage
          json-summary-path: frontend/coverage/coverage-summary.json
          json-final-path: frontend/coverage/coverage-final.json

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage
          if-no-files-found: ignore
