name: PR Checks

on:
  pull_request:
    branches: [main, master]

# Cancel in-progress runs when a new commit is pushed to the same PR.
concurrency:
  group: pr-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Java 21)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Verify (checkstyle + tests + package)
        # `verify` runs the validate phase (Checkstyle), test phase, and package phase.
        # Testcontainers picks up the Docker daemon that's already running on ubuntu-latest.
        run: ./mvnw --batch-mode --no-transfer-progress verify

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-surefire-reports
          path: backend/target/surefire-reports
          if-no-files-found: ignore

  frontend:
    name: Frontend (Node 20 + Yarn 4)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint
        run: yarn lint

      - name: Typecheck + build
        run: yarn build

      - name: Run tests
        run: yarn test:run
