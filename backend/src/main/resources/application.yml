app:
  # POSTGRESQL, MYSQL, or ORACLE. Must match the JDBC driver bundled by the active
  # Maven profile (postgresql is default; -Pmysql / -Poracle swap the driver in).
  # When building with -Pmysql or -Poracle, set APP_DIALECT=MYSQL / ORACLE at runtime.
  dialect: ${APP_DIALECT:POSTGRESQL}

spring:
  profiles:
    # Pick the local profile that matches the bundled JDBC driver:
    # local-postgresql (default), local-mysql, or local-oracle.
    active: ${LOCAL_PROFILE:local-postgresql}
  application:
    name: springbatch-dashboard
  jpa:
    hibernate:
      ddl-auto: validate
      naming:
        # Use names exactly as declared in @Table/@Column. Spring Boot's default would
        # lowercase the explicit BATCH_* table names which case-sensitive MySQL won't find.
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    # No explicit database-platform: Hibernate auto-detects per JDBC connection
    # so the same boot can serve mixed Postgres + MySQL datasources.
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
