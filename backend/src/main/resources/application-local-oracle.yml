spring:
  config:
    import: optional:file:.env[.properties]
  docker:
    compose:
      lifecycle-management: start_only
  jpa:
    hibernate:
      # Oracle's upstream Spring Batch DDL uses CLOB for SERIALIZED_CONTEXT, while the
      # Postgres/MySQL DDL uses TEXT. The shared entities declare columnDefinition = "TEXT"
      # for those two engines; against Oracle, Hibernate's strict validator flags the
      # CLOB-vs-TEXT mismatch even though queries work fine. Disable validation only on
      # the Oracle profile — the dashboard is read-only against a fixed external schema.
      ddl-auto: none
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}

app:
  cors:
    allowed-origins: http://localhost:5173
  oauth2:
    success-url: http://localhost:5173/overview
  datasources:
    - name: Localhost Oracle
      url: jdbc:oracle:thin:@//${ORACLE_HOST:localhost}:${ORACLE_PORT:1521}/${ORACLE_DB:FREEPDB1}
      username: ${ORACLE_USER}
      password: ${ORACLE_PASSWORD}
